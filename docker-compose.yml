version: '3.8'

services:
  # Your Node.js Application
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      # 'database' matches the service name below, acting as the hostname
      - MONGODB_URI=mongodb://database:27017/crud_api
      - PORT=5000
    depends_on:
      - database

  # Your MongoDB Database
  database:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

# Keeps your data safe even if you stop the containers
volumes:
  mongo-data: